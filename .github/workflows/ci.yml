name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-type:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Unit tests (no external tools)
        run: pytest -m "not differential" -v

  engine-tests:
    name: Engine + differential tests (vs reference tRNAscan-SE 2.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Infernal + reference tRNAscan-SE 2.0
        run: |
          sudo apt-get update
          sudo apt-get install -y infernal trnascan-se
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Full suite with engines present: exercises the unit, requires_infernal,
      # requires_trnascan, and differential tests.
      - name: Full test suite (with engines)
        run: pytest -v

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install twine
          twine check dist/*
